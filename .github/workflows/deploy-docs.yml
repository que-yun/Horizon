name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          publish_branch: gh-pages
          enable_jekyll: true

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    permissions:
      contents: read
    env:
      FEISHU_BOT_WEBHOOK_URL: ${{ secrets.FEISHU_BOT_WEBHOOK_URL }}
      FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
      HORIZON_GIT_REMOTE: origin
      HORIZON_GIT_BRANCH: main
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve latest summary post
        id: summary
        shell: bash
        run: |
          set -euo pipefail
          latest_post="$(ls docs/_posts/*-summary-zh.md 2>/dev/null | sort | tail -n 1 || true)"
          if [[ -z "$latest_post" ]]; then
            echo "summary_path=" >> "$GITHUB_OUTPUT"
            echo "summary_date=$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "summary_path=$latest_post" >> "$GITHUB_OUTPUT"
          basename="$(basename "$latest_post")"
          echo "summary_date=${basename%-summary-zh.md}" >> "$GITHUB_OUTPUT"

      - name: Notify Feishu
        if: env.FEISHU_BOT_WEBHOOK_URL != ''
        shell: bash
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          SUMMARY_PATH: ${{ steps.summary.outputs.summary_path }}
          SUMMARY_DATE: ${{ steps.summary.outputs.summary_date }}
          PAGES_URL: ${{ format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
        run: |
          set -euo pipefail
          status="failed"
          message="GitHub Pages 发布失败"
          if [[ "$DEPLOY_RESULT" == "success" ]]; then
            status="success"
            message="GitHub Pages 已发布成功"
          fi

          python3 scripts/notify_feishu.py \
            --status "$status" \
            --date "${SUMMARY_DATE:-$(date -u '+%Y-%m-%d')}" \
            --summary-path "${SUMMARY_PATH:-docs/_posts/}" \
            --pages-url "$PAGES_URL" \
            --source-path "${SUMMARY_PATH:-}" \
            --message "$message"
